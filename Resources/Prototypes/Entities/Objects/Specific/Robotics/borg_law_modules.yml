- type: entity
  id: BaseLawModule
  parent: BaseItem
  name: law module
  description: A module which can add or replace silicon laws.
  abstract: true
  components:
  - type: LawModule
  - type: Item
    size: Small
  - type: Sprite
    sprite: Objects/Misc/module.rsi
  - type: GuideHelp
    guides:
      - Cyborgs
  - type: ActivatableUI
    key: enum.LawModuleUiKey.Key
  - type: UserInterface
    interfaces:
      enum.LawModuleUiKey.Key:
        type: LawEditingBoundUserInterface

- type: entity
  id: LawModuleFreeform
  parent: BaseLawModule
  name: freeform module
  components:
  - type: Sprite
    layers:
    - state: mainboard
